name: Generate Metrics

on:
  schedule:
    # 01:00 Asia/Shanghai
    - cron: "0 17 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/metrics.yml
      - README.md

jobs:
  metrics:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate base metrics
        uses: lowlighter/metrics@latest
        with:
          # A PAT stored as METRICS_TOKEN is recommended for fuller data.
          token: ${{ secrets.METRICS_TOKEN != '' && secrets.METRICS_TOKEN || github.token }}
          user: Mlers0229
          filename: metrics/base.svg
          output_action: commit
          committer_branch: metrics-output
          committer_message: "chore: update ${filename}"
          config_timezone: Asia/Shanghai
          config_output: svg
          config_display: large
          base: header, activity, community, repositories, metadata
          repositories_skipped: |
            Mlers0229/Mlers0229
            Mlers0229/astrbot2github
            Mlers0229/CatNote
            Mlers0229/MCDNDC

      - name: Generate language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN != '' && secrets.METRICS_TOKEN || github.token }}
          user: Mlers0229
          filename: metrics/languages.svg
          output_action: commit
          committer_branch: metrics-output
          committer_message: "chore: update ${filename}"
          config_timezone: Asia/Shanghai
          config_output: svg
          config_display: large
          base: ""
          repositories_skipped: |
            Mlers0229/Mlers0229
            Mlers0229/astrbot2github
            Mlers0229/CatNote
            Mlers0229/MCDNDC
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15

      - name: Generate isometric calendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN != '' && secrets.METRICS_TOKEN || github.token }}
          user: Mlers0229
          filename: metrics/isocalendar.svg
          output_action: commit
          committer_branch: metrics-output
          committer_message: "chore: update ${filename}"
          config_timezone: Asia/Shanghai
          config_output: svg
          config_display: large
          base: ""
          plugin_isocalendar: yes
